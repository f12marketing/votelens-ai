[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install"]

[phases.build]
# Build shared and backend for production
cmds = ["npm run build --workspace=shared", "npm run build --workspace=backend"]

[start]
# Start the compiled backend server
cmd = "npm run start:prod --workspace=backend"

[variables]
NODE_ENV = "production"
PORT = "3000"
